<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/img/DOMODI.png" />
    <title>Detalle Legal - DOMODI LEGAL & BUSINESS</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="container-fluid">
          <div class="row align-items-center">
            <div class="col-6 col-md-4">
              <a href="index.html" class="navbar-brand">
                <img
                  src="assets/img/DOMODI.png"
                  alt="Logo DOMODI"
                  class="logo-principal"
                />
                DOMODI Legal &amp; Business
              </a>
            </div>
              <div class="nav-menu" id="mainNav">
                <ul class="nav justify-content-end">
                  <li class="nav-item">
                    <a class="nav-link" href="index.html" data-section="inicio"
                      >Volver</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="property-detail-main">
      <section class="property-detail-section">
        <div class="container-fluid property-detail-container">
          <div class="back-button-wrap">
            <a href="index.html" class="btn-volver">← Volver</a>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4 mb-md-0">
              <div class="detail-image-wrap">
                <img
                  id="detailImage"
                  src=""
                  alt="Imagen del código legal"
                  class="detail-image"
                />
              </div>
            </div>

            <div class="col-md-6">
              <div class="detail-content">
                <p class="detail-location" id="detailLocation"></p>
                <h1 class="detail-title" id="detailTitle"></h1>
                <div class="detail-divider"></div>

                <div class="detail-info-group">
                  <span class="detail-label">OBJETIVO</span>
                  <p class="detail-description" id="detailDescription"></p>
                </div>

                <div class="detail-info-group">
                  <span class="detail-label">ENLACE OFICIAL</span>
                  <div class="detail-links" id="detailLinks"></div>
                </div>

                <div class="detail-stats" id="detailStats"></div>

                <div class="detail-contact-box">
                  <span class="detail-label">CONTACTO</span>
                  <p class="detail-contact" id="detailContact"></p>
                  <button class="btn-contact">Enviar Consulta</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p class="footer-logo">DOMODI Legal &amp; Business</p>
      <p class="footer-copy">© 2026 DOMODI. Todos los derechos reservados.</p>
    </footer>

    <script src="./assets/js/legal-detail.js"></script>
  </body>
</html>
