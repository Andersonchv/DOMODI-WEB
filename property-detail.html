<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/img/DOMODI.png">
  <title>Detalle de Propiedad - DOMODI LEGAL & BUSINESS</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom styles -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

  <header>
    <nav>
      <div class="container-fluid">
        <div class="row align-items-center">

          <div class="col-6 col-md-4">
            <a href="index.html" class="navbar-brand">
              <img src="assets/img/DOMODI.png"
                   alt="Logo DOMODI"
                   class="logo-principal">
              DOMODI Legal &amp; Business
            </a>
          </div>

          <div class="col-6 col-md-8">
            <ul class="nav justify-content-end">
              <li class="nav-item">
                <a class="nav-link" href="index.html" data-section="inicio">Volver</a>
              </li>
            </ul>
          </div>

        </div>
      </div>
    </nav>
  </header>

  <main class="property-detail-main">

    <!-- Detalle de Propiedad -->
    <section class="property-detail-section">
      <div class="container-fluid property-detail-container">
        
        <!-- Botón Volver -->
        <div class="back-button-wrap">
          <a href="index.html" class="btn-volver">← Volver</a>
        </div>

        <div class="row">
          <!-- Imagen Principal -->
          <div class="col-md-6 mb-4 mb-md-0">
            <div class="detail-image-wrap">
              <img id="detailImage" src="" alt="Imagen de la propiedad" class="detail-image">
            </div>
          </div>

          <!-- Información Detallada -->
          <div class="col-md-6">
            <div class="detail-content">
              <p class="detail-location" id="detailLocation"></p>
              <h1 class="detail-title" id="detailTitle"></h1>
              <div class="detail-divider"></div>

              <!-- Precio -->
              <div class="detail-info-group">
                <span class="detail-label">PRECIO</span>
                <p class="detail-price" id="detailPrice"></p>
              </div>

              <!-- Disponibilidad -->
              <div class="detail-info-group">
                <span class="detail-label">DISPONIBILIDAD</span>
                <p class="detail-availability" id="detailAvailability"></p>
              </div>

              <!-- Descripción -->
              <div class="detail-info-group">
                <span class="detail-label">DESCRIPCIÓN</span>
                <p class="detail-description" id="detailDescription"></p>
              </div>

              <!-- Estadísticas -->
              <div class="detail-stats" id="detailStats">
                <!-- Se completa desde JS -->
              </div>

              <!-- Contacto -->
              <div class="detail-contact-box">
                <span class="detail-label">CONTACTO</span>
                <p class="detail-contact" id="detailContact"></p>
                <button class="btn-contact">Enviar Consulta</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer>
    <p class="footer-logo">DOMODI Legal &amp; Business</p>
    <p class="footer-copy">© 2026 DOMODI. Todos los derechos reservados.</p>
  </footer>

  <script src="./assets/js/property-detail.js"></script>

</body>
</html>
